<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <title>萌宝剪贴板</title>
    <script>
      // 全局错误浮层（先于业务 bundle 执行，连脚本 404 也能捕获）
      (function () {
        function show(msg) {
          var el = document.getElementById("error-overlay");
          if (!el) {
            el = document.createElement("div");
            el.id = "error-overlay";
            el.style.cssText =
              "position:fixed;inset:0;z-index:99999;background:#fff;color:#c00;font:12px/1.5 monospace;padding:16px;white-space:pre-wrap;overflow:auto;";
            document.body.appendChild(el);
          }
          el.textContent += "\n" + msg;
        }
        window.__showError = show;
        window.addEventListener(
          "error",
          function (e) {
            if (e.target && (e.target.tagName === "SCRIPT" || e.target.tagName === "LINK")) {
              show("资源加载失败: " + (e.target.src || e.target.href));
            } else {
              show(
                "window.error: " +
                  (e.message || (e.error && e.error.message)) +
                  "\n" +
                  (e.error && e.error.stack ? e.error.stack : "")
              );
            }
          },
          true
        );
        window.addEventListener("unhandledrejection", function (e) {
          var r = e.reason;
          show(
            "unhandledrejection: " +
              (r && r.message ? r.message : r) +
              "\n" +
              (r && r.stack ? r.stack : "")
          );
        });
      })();
    </script>
  </head>

  <body style="background: #f5f5f5; margin: 0; padding: 0;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
